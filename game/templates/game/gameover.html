{% extends "game/base.html" %}

{% block content %}
<div style="text-align:center;">

  <div style="font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:3px; color:var(--gold); margin-bottom:8px;">
    Fim de Jogo!
  </div>

  <div style="font-family:'Bebas Neue',sans-serif; font-size:6rem; color:var(--text); line-height:1;">
    {{ score }}
  </div>
  <div style="color:var(--muted); font-size:.8rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px;">
    acerto{{ score|pluralize:"s" }}
  </div>

  <div style="color:var(--muted); font-size:.95rem; margin-bottom:32px;">
    {{ round }} rodada{{ round|pluralize:"s" }} jogada{{ round|pluralize:"s" }}
  </div>

  {% if round > 0 %}
  <div style="background:#16231a; border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:28px;">
    <div style="font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--gold);">
      {{ score }} / {{ round }}
    </div>
    <div style="color:var(--muted); font-size:.8rem; text-transform:uppercase; letter-spacing:1px;">
      aproveitamento
    </div>
  </div>
  {% endif %}

  <a href="{% url 'index' %}" class="btn" style="text-align:center; display:block;">
    JOGAR NOVAMENTE
  </a>

</div>
{% endblock %}
