{% extends "game/base.html" %}

{% block content %}
<div style="margin-bottom:24px;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <span style="color:var(--muted); font-size:.8rem; text-transform:uppercase; letter-spacing:1px;">
      Rodada {{ round }}
    </span>
    <span style="color:var(--gold); font-family:'Bebas Neue',sans-serif; font-size:1.4rem;">
      {{ score }} acerto{{ score|pluralize:"s" }}
    </span>
  </div>

  <div style="height:4px; background:var(--border); border-radius:4px;">
    <div style="height:100%; background:var(--gold); border-radius:4px; width:{{ round }}0%;"></div>
  </div>
</div>

<div style="text-align:center; margin-bottom:28px;">
  <p style="color:var(--muted); font-size:.8rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;">
    Quem foi o artilheiro dessa seleção nessa Copa?
  </p>
  <div style="font-family:'Bebas Neue',sans-serif; font-size:clamp(1.8rem,5vw,2.8rem); letter-spacing:2px; color:var(--gold);">
    {{ question.team }}
  </div>
  <div style="font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--text); margin-top:4px;">
    Copa de {{ question.year }}
  </div>
</div>

<form method="POST" action="{% url 'answer' %}">
  {% csrf_token %}
  <div style="display:flex; flex-direction:column; gap:12px;">
    {% for option in question.options %}
    <button type="submit" name="player_name" value="{{ option.player_name }}"
      style="background:#16231a; border:1.5px solid var(--border); border-radius:12px; padding:16px 20px;
             cursor:pointer; text-align:left; color:var(--text); font-size:1rem; font-weight:600;
             transition: border-color .2s;"
      onmouseover="this.style.borderColor='var(--gold)'"
      onmouseout="this.style.borderColor='var(--border)'">
      {{ option.player_name }}
    </button>
    {% endfor %}
  </div>
</form>
{% endblock %}
